name: Build Dave the Diver Cheat Dylib

on:
  push:
    paths:
      - '潜水员戴夫Dylib/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Build DaveCheat dylib
      run: |
        cd 潜水员戴夫Dylib
        
        clang -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -miphoneos-version-min=14.0 \
          -dynamiclib \
          -framework UIKit \
          -framework Foundation \
          -framework CoreGraphics \
          -fobjc-arc \
          -Wno-deprecated-declarations \
          -o DaveCheat.dylib \
          DaveCheat.m
        
        ldid -S DaveCheat.dylib || codesign -f -s - DaveCheat.dylib
        
        echo "DaveCheat build completed!"
        ls -la DaveCheat.dylib
    
    - name: Build DaveTest dylib (minimal)
      run: |
        cd 潜水员戴夫Dylib
        
        if [ -f DaveTest.m ]; then
          clang -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -miphoneos-version-min=14.0 \
            -dynamiclib \
            -framework Foundation \
            -fobjc-arc \
            -o DaveTest.dylib \
            DaveTest.m
          
          ldid -S DaveTest.dylib || codesign -f -s - DaveTest.dylib
          echo "DaveTest build completed!"
          ls -la DaveTest.dylib
        else
          echo "DaveTest.m not found, skipping"
        fi
    
    - name: Upload DaveCheat dylib
      uses: actions/upload-artifact@v4
      with:
        name: DaveCheat-dylib
        path: 潜水员戴夫Dylib/DaveCheat.dylib
    
    - name: Upload DaveTest dylib
      if: hashFiles('潜水员戴夫Dylib/DaveTest.dylib') != ''
      uses: actions/upload-artifact@v4
      with:
        name: DaveTest-dylib
        path: 潜水员戴夫Dylib/DaveTest.dylib
